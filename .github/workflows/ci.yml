name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build
        run: make build-all

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test-race

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Validate example sre.yaml files
        run: |
          for f in examples/**/sre.yaml; do
            echo "Validating $f..."
            ./bin/burnless validate "$f"
          done
